<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Thank You | Phat Gorrilla</title>
  <meta name="description" content="Thank you for your Phat Gorrilla order. Access your free app bonus.">
  <style>
    :root {
      --pg-black:#05070b;
      --pg-pink:#ff2da8;
      --pg-green:#24f087;
      --pg-white:#ffffff;
      --pg-muted:#b8c2d8;
    }

    * { box-sizing:border-box; }

    body {
      margin:0;
      min-height:100vh;
      font-family:Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,45,168,.22), transparent 30%),
        radial-gradient(circle at top right, rgba(36,240,135,.18), transparent 32%),
        linear-gradient(180deg, #05070b 0%, #090d16 55%, #05070b 100%);
      color:var(--pg-white);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .card {
      width:min(900px, 100%);
      border:1px solid rgba(36,240,135,.32);
      border-radius:32px;
      padding:34px;
      background:
        radial-gradient(circle at top left, rgba(255,45,168,.18), transparent 35%),
        linear-gradient(145deg, rgba(15,22,36,.96), rgba(5,7,11,.98));
      box-shadow:0 28px 90px rgba(0,0,0,.52);
      text-align:center;
    }

    img {
      width:150px;
      max-width:70%;
      margin-bottom:20px;
      filter:drop-shadow(0 0 24px rgba(36,240,135,.22));
    }

    .eyebrow {
      display:inline-flex;
      padding:8px 13px;
      border-radius:999px;
      border:1px solid rgba(255,45,168,.38);
      color:var(--pg-green);
      font-size:.78rem;
      font-weight:950;
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    h1 {
      margin:18px 0 12px;
      font-size:clamp(2.2rem, 7vw, 5rem);
      line-height:.95;
      text-transform:uppercase;
      letter-spacing:-.05em;
      text-shadow:
        0 0 26px rgba(255,45,168,.34),
        0 0 20px rgba(36,240,135,.18);
    }

    p {
      max-width:680px;
      margin:0 auto 22px;
      color:var(--pg-muted);
      font-size:1.08rem;
      line-height:1.6;
    }

    .actions {
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:26px;
    }

    a {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:48px;
      padding:12px 18px;
      border-radius:999px;
      text-decoration:none;
      font-weight:950;
      letter-spacing:.05em;
      text-transform:uppercase;
    }

    .primary {
      background:linear-gradient(90deg, var(--pg-pink), var(--pg-green));
      color:#05070b;
      border:1px solid rgba(36,240,135,.7);
      box-shadow:
        0 0 24px rgba(255,45,168,.24),
        0 0 18px rgba(36,240,135,.18);
    }

    .secondary {
      color:#fff;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(36,240,135,.28);
    }
  </style>
</head>
<body>
  <main class="card">
    <img src="assets/brand/pg-main-badge.png" alt="Phat Gorrilla badge">
    <div class="eyebrow">Order received</div>
    <h1>Thank You</h1>
    <p>
      Thanks for your Phat Gorrilla order. Your product is handled through the checkout and fulfilment process.
      As promised, your purchase includes free access to the Phat Gorrilla app page.
    </p>
    <div class="actions">
      <a class="primary" href="/app">Open Free App</a>
      <a class="secondary" href="/shop">Back To Shop</a>
    </div>
  </main>
</body>
</html>
