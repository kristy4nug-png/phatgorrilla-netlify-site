<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHAT GORRILLA | Official Store & App</title>
    <link rel="stylesheet" href="pod-styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Arial, sans-serif; }
        body { background-color: #050505; color: #ffffff; text-align: center; }
        .hero { padding: 80px 20px; border-bottom: 1px solid #222; }
        .hero h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; }
        .hero p { color: #888; font-size: 1rem; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; }
        .promo-banner { background: #fff; color: #000; padding: 10px; font-weight: bold; font-size: 0.9rem; letter-spacing: 1px; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
    </style>
</head>
<body>
    <div class="promo-banner">
        Every purchase unlocks lifetime access to our companion app.
    </div>
    
    <header class="hero">
        <h1>Phat Gorrilla</h1>
        <p>Premium Heavyweight Apparel • Built to Roar</p>
    </header>

    <main class="container">
        <!-- This is where your Print-on-Demand products will automatically load -->
        <div id="phat-gorrilla-store"></div>
    </main>

    <script src="pod-engine.js"></script>
</body>
</html>
